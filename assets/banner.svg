<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Silver Nsaka — Cybersecurity and Agentic AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="55%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#101a2e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#233250" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <style>
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .sans { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .drift1 { animation: drift1 9s ease-in-out infinite alternate; }
      .drift2 { animation: drift2 11s ease-in-out infinite alternate; }
      @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(40px,14px); } }
      @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-34px,-10px); } }
      .scan { animation: scan 7s linear infinite; }
      @keyframes scan { from { transform: translateX(-300px); } to { transform: translateX(1500px); } }
      .node { animation: pulse 3.2s ease-in-out infinite; }
      .node.d1 { animation-delay: .6s; } .node.d2 { animation-delay: 1.2s; }
      .node.d3 { animation-delay: 1.8s; } .node.d4 { animation-delay: 2.4s; }
      @keyframes pulse { 0%,100% { opacity: .25; } 50% { opacity: .9; } }
    </style>
  </defs>
  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#grid)"/>
  <circle class="drift1" cx="980" cy="60" r="180" fill="url(#glow1)"/>
  <circle class="drift2" cx="180" cy="220" r="160" fill="url(#glow2)"/>
  <g stroke="#3b5f8a" stroke-width="1" opacity="0.55">
    <line x1="905" y1="85" x2="985" y2="55"/>
    <line x1="985" y1="55" x2="1065" y2="95"/>
    <line x1="985" y1="55" x2="1005" y2="150"/>
    <line x1="905" y1="85" x2="1005" y2="150"/>
    <line x1="1005" y1="150" x2="1095" y2="185"/>
    <line x1="1065" y1="95" x2="1095" y2="185"/>
    <line x1="905" y1="85" x2="845" y2="170"/>
    <line x1="845" y1="170" x2="1005" y2="150"/>
  </g>
  <g fill="#7dd3fc">
    <circle class="node" cx="905" cy="85" r="4"/>
    <circle class="node d1" cx="985" cy="55" r="5"/>
    <circle class="node d2" cx="1065" cy="95" r="3.5"/>
    <circle class="node d3" cx="1005" cy="150" r="5"/>
    <circle class="node d4" cx="1095" cy="185" r="3.5"/>
    <circle class="node d2" cx="845" cy="170" r="4"/>
  </g>
  <text x="72" y="78" class="mono" font-size="15" fill="#5eead4" opacity="0.9">~/silver &#36; whoami</text>
  <text x="70" y="136" class="sans" font-size="52" font-weight="700" fill="url(#title)" letter-spacing="0.5">Silver Nsaka</text>
  <g class="scan">
    <rect x="0" y="152" width="300" height="2.5" fill="url(#line)" rx="1.25"/>
  </g>
  <rect x="72" y="152" width="470" height="1" fill="#233250"/>
  <text x="72" y="188" class="sans" font-size="20" fill="#c9d5e8">Cybersecurity Engineer&#160;&#160;·&#160;&#160;Agentic AI Builder&#160;&#160;·&#160;&#160;Author</text>
  <text x="72" y="224" class="mono" font-size="14.5" fill="#8b9cb8">&gt; building intelligent systems that protect, create, and connect<tspan class="cursor" fill="#5eead4">▌</tspan></text>
</svg>
